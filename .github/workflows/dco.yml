name: DCO

on:
  pull_request:
    branches: ["main"]

permissions: read-all

jobs:
  dco:
    name: DCO check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MISSING=$(git log "$BASE".."$HEAD" --format="%H %s" | while read sha msg; do
            if ! git log -1 --format="%B" "$sha" | grep -q "^Signed-off-by:"; then
              echo "  $sha $msg"
            fi
          done)
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing a Signed-off-by trailer:"
            echo "$MISSING"
            echo ""
            echo "Please add 'Signed-off-by: Name <email>' to each commit (git commit -s)."
            exit 1
          fi
          echo "All commits have a DCO sign-off."
